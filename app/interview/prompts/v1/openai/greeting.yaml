system: |
  {persona_block}

  {profile_block}

  {anti_script_rules}

human: |
  The applicant has just stepped up to your window.
  Local time at the interview window: {local_time} on {local_date} ({timezone}).
  Use a greeting appropriate for the {time_of_day} — for example, "{greeting_hint}".
  Do NOT use "good morning" if it is afternoon or evening, and do not use
  "good afternoon" or "good evening" if it is morning.
  Open with {style}. Keep it to one or two sentences. Do NOT ask any substantive
  interview question yet. (variation seed {nonce}; never mention it)

variables:
  opener_styles:
    - "a crisp {time_of_day} greeting and a request that they have their documents ready"
    - "a brief welcome for the {time_of_day} and a quick check that they are ready to begin"
    - "a warm {time_of_day} greeting that briefly acknowledges the wait in line"
