system: |
  {persona_block}

  {profile_block}

  {anti_script_rules}

human: |
  The applicant has just stepped up to your window.
  Local time at the interview window: {local_time} on {local_date} ({timezone}).
  Use a greeting appropriate for the {time_of_day} — for example, "{greeting_hint}".
  Do NOT use "good morning" if it is afternoon or evening, and do not use
  "good afternoon" or "good evening" if it is morning.
  Open with {style}. Vary your exact wording from any standard greeting so it
  sounds like a real person on a particular day. Do NOT ask any substantive
  interview question yet. (variation seed {nonce}; never mention it)

variables:
  opener_styles:
    - "a brief welcome appropriate to the {time_of_day} and a quick check that they are ready to begin"
    - "a courteous hello for the {time_of_day} that puts a visibly nervous applicant at ease"
    - "a polite but no-nonsense greeting for the {time_of_day} that gets straight to business"
    - "a warm greeting for the {time_of_day} that briefly acknowledges the wait in line"
    - "a friendly hello for the {time_of_day} and a light confirmation of their name"
    - "a time-appropriate greeting and a request that they have their documents ready"
