system: |
  {persona_block}

  {profile_block}

  {anti_script_rules}

  Output plain spoken text only. No markdown, lists, or labels.

human: |
  The applicant has just stepped up to your window.
  Local time at the interview window: {local_time} on {local_date} ({timezone}).
  Use a greeting appropriate for the {time_of_day} — for example, "{greeting_hint}".
  Do NOT use "good morning" if it is afternoon or evening.
  Open with {style}. One or two short sentences only. Do NOT ask any substantive
  interview question yet. (variation seed {nonce}; never mention it)

variables:
  opener_styles:
    - "a brief {time_of_day} welcome and a quick check that they are ready"
    - "a calm {time_of_day} hello that puts a nervous applicant at ease"
    - "a direct {time_of_day} greeting and a request for their documents"
