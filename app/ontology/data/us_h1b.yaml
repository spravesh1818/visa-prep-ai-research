country: US
visa_type: H1B
display_name: United States H-1B Specialty Occupation Visa
description: >
  Temporary worker in a specialty occupation. The officer must confirm a bona
  fide employer and job offer, that the role requires the applicant's
  specialized degree, and that the applicant is qualified.

officer_persona:
  name: U.S. Consular Officer
  tone: professional, detail-oriented
  strictness: 0.55
  style_notes:
    - Focus on the employer, the role, and degree-role fit.
    - Petition (I-129) details are central.

topics:
  - id: employer_and_role
    label: Employer and Job Role
    intent: >
      Identify the petitioning employer and the specific role, confirming it is
      a genuine specialty occupation.
    weight: 1.4
    expected_signals:
      - Names employer and describes the role concretely
      - Clear job duties requiring specialized knowledge
      - Knows work location and team
    red_flags:
      - Cannot describe the employer or role
      - Role does not require a specialized degree
      - Signs of a shell / staffing-only arrangement without a real project
    probe_triggers:
      - Vague job duties
      - Unclear end-client or work location
    entities:
      - employer
      - job_title
      - work_location

  - id: qualifications_fit
    label: Qualifications and Degree Fit
    intent: >
      Confirm the applicant holds the degree the specialty occupation requires
      and that their background fits the role.
    weight: 1.3
    expected_signals:
      - Relevant degree in the required field
      - Experience matching the job duties
    red_flags:
      - Degree unrelated to the role
      - Credentials inconsistent with the position
    probe_triggers:
      - Degree-role mismatch
      - Experience does not support the title
    entities:
      - degree
      - field_of_study
      - years_experience

  - id: compensation
    label: Compensation and Terms
    intent: >
      Confirm the offered wage and terms are consistent with the role and the
      petition.
    weight: 1.0
    expected_signals:
      - Knows salary and that it meets prevailing wage
      - Consistent with role and location
    red_flags:
      - Unaware of salary
      - Compensation implausibly low or high for the role
    probe_triggers:
      - Salary inconsistent with role
    entities:
      - salary
      - employment_type

  - id: intent_and_history
    label: Intent and Immigration History
    intent: >
      Review immigration history and current status; H-1B allows dual intent,
      so focus on bona fides rather than ties home.
    weight: 0.9
    expected_signals:
      - Clean immigration history
      - Consistent prior status / employment
    red_flags:
      - Undisclosed prior violations
      - Inconsistencies with prior filings
    probe_triggers:
      - Gaps or inconsistencies in status history
    entities:
      - prior_us_status
      - prior_refusals

consistency_rules:
  - id: degree_vs_role
    description: >
      The applicant's degree field must match the specialty occupation's
      requirement.
    related_topics: [employer_and_role, qualifications_fit]
  - id: wage_vs_role
    description: >
      Offered compensation should be consistent with the role and location.
    related_topics: [compensation]
